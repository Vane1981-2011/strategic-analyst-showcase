<style>
:root {
  --bg-primary: #0a1628; --bg-secondary: #0f1f3a; --bg-card: #132744;
  --bg-card-hover: #1a3359; --border-color: #1e3a5f; --border-accent: #2d5a9e;
  --text-primary: #e8edf5; --text-secondary: #8899b4; --text-muted: #5a6d86;
  --accent-blue: #3b82f6; --accent-cyan: #06b6d4; --accent-green: #10b981;
  --accent-orange: #f59e0b; --accent-red: #ef4444; --accent-purple: #8b5cf6;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
.app-container{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg-secondary);border-right:1px solid var(--border-color);padding:20px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-logo{padding:0 20px 24px;border-bottom:1px solid var(--border-color);margin-bottom:12px}
.sidebar-logo h1{font-size:17px;font-weight:700;background:linear-gradient(135deg,#3b82f6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar-logo .subtitle{font-size:10px;color:var(--text-muted);margin-top:2px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 16px;margin:2px 8px;border-radius:6px;color:var(--text-secondary);text-decoration:none;font-size:13px;cursor:pointer;transition:all .15s}
.nav-item:hover{background:var(--bg-card-hover);color:var(--text-primary)}
.nav-item.active{background:var(--bg-card);color:var(--accent-blue);position:relative}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--accent-blue);border-radius:0 3px 3px 0}
.nav-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--accent-red);color:#fff;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600}
.main-content{flex:1;margin-left:220px;padding:28px 40px;min-height:100vh}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.page-header h2{font-size:22px;font-weight:700}
.breadcrumb{font-size:12px;color:var(--text-muted);margin-top:2px}
.breadcrumb span{color:var(--accent-blue)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:24px}
.kpi-card{background:linear-gradient(180deg,#1a3359,#132744);border:1px solid var(--border-color);border-radius:10px;padding:20px;position:relative;overflow:hidden;transition:all .3s}
.kpi-card:hover{border-color:var(--border-accent);box-shadow:0 0 20px rgba(59,130,246,.15);transform:translateY(-2px)}
.kpi-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.kpi-value{font-size:30px;font-weight:700;font-family:'SF Mono','Fira Code',monospace;margin-bottom:4px}
.kpi-value.blue{color:var(--accent-blue)}.kpi-value.green{color:var(--accent-green)}.kpi-value.orange{color:var(--accent-orange)}.kpi-value.cyan{color:var(--accent-cyan)}
.kpi-change{font-size:12px;display:flex;align-items:center;gap:4px}.kpi-change.up{color:var(--accent-green)}.kpi-change.down{color:var(--accent-red)}
.kpi-sub{font-size:10px;color:var(--text-muted);margin-top:2px}
.kpi-progress-bar{margin-top:8px;height:3px;background:var(--border-color);border-radius:2px;overflow:hidden}
.kpi-progress-fill{height:100%;border-radius:2px;transition:width 1s}
.kpi-progress-fill.blue{background:var(--accent-blue)}.kpi-progress-fill.green{background:var(--accent-green)}.kpi-progress-fill.cyan{background:var(--accent-cyan)}
.chart-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:24px}
.chart-grid-full{grid-column:1/-1}
.chart-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:10px;overflow:hidden}
.chart-card-header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border-color)}
.chart-card-header h3{font-size:14px;font-weight:600}
.chart-period{font-size:11px;color:var(--text-muted)}
.chart-card-body{padding:20px;position:relative}
.chart-card-body canvas{width:100%!important}
.mini-stats{display:flex;gap:12px;padding:12px 20px}
.mini-stat{flex:1;text-align:center}
.mini-stat-value{font-size:16px;font-weight:700;font-family:'SF Mono','Fira Code',monospace}
.mini-stat-label{font-size:10px;color:var(--text-muted);margin-top:2px}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table thead th{background:var(--bg-secondary);color:var(--text-muted);font-weight:600;text-align:left;padding:8px 14px;border-bottom:2px solid var(--border-color);font-size:10px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.data-table tbody td{padding:8px 14px;border-bottom:1px solid var(--border-color);color:var(--text-primary);font-family:'SF Mono','Fira Code',monospace;font-size:11px}
.data-table tbody tr:hover{background:var(--bg-card-hover)}
.status-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:500;font-family:var(--font-sans)}
.status-badge.normal{background:rgba(16,185,129,.15);color:var(--accent-green)}.status-badge.warning{background:rgba(245,158,11,.15);color:var(--accent-orange)}.status-badge.danger{background:rgba(239,68,68,.15);color:var(--accent-red)}.status-badge.info{background:rgba(59,130,246,.15);color:var(--accent-blue)}
.indicator-light{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;animation:pulse 2s infinite}.indicator-light.green{background:var(--accent-green);box-shadow:0 0 5px var(--accent-green)}.indicator-light.yellow{background:var(--accent-orange);box-shadow:0 0 5px var(--accent-orange)}.indicator-light.red{background:var(--accent-red);box-shadow:0 0 5px var(--accent-red);animation-duration:1s}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.alert-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border-color)}.alert-item:hover{background:var(--bg-card-hover)}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px}.alert-content{flex:1}.alert-title{font-size:12px;font-weight:600}.alert-desc{font-size:11px;color:var(--text-muted);margin-top:2px}.alert-time{font-size:10px;color:var(--text-muted);white-space:nowrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:inherit}
.btn-outline{background:transparent;color:var(--text-secondary);border-color:var(--border-color)}.btn-outline:hover{background:var(--bg-card-hover);color:var(--text-primary)}
.btn-primary{background:var(--accent-blue);color:#fff}.btn-primary:hover{background:#2563eb}
.section-title{font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;gap:8px}
.footer{padding:20px 40px;text-align:center;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border-color);margin-top:32px}
.footer a{color:var(--accent-blue);text-decoration:none}
@media(max-width:1400px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.chart-grid{grid-template-columns:1fr}}
@media(max-width:768px){.sidebar{display:none}.main-content{margin-left:0;padding:16px}.kpi-grid{grid-template-columns:1fr}}
</style>
</head>

// ========== 表格渲染 ==========
function renderRiskTable(){
  let h='<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>指标</th><th>当前值</th><th>预警阈值</th><th>状态</th><th>趋势</th><th>建议</th></tr></thead><tbody>';
  const tips={资产负债率:'结构合理，保持当前水平',流动比率:'流动性充裕，可适度投资',速动比率:'短期偿债能力强',应收账款周转天数:'加强回款催收力度',存货周转天数:'建议优化库存管理，加速周转',利息保障倍数:'偿债能力优秀',经营现金流比率:'现金流健康，持续监控',成本费用率:'成本控制有效，持续优化'};
  riskIndicators.forEach(r=>{
    const cls=r.status==='normal'?'green':r.status==='warning'?'yellow':'red';
    const st=r.status==='normal'?'正常':r.status==='warning'?'关注':'预警';
    h+=`<tr><td>${r.name}</td><td><strong>${r.value}${r.unit}</strong></td><td>${r.threshold}${r.unit}</td><td><span class="indicator-light ${cls}"></span>${st}</td><td>${r.trend==='up'?'📈上升':r.trend==='down'?'📉下降':'➡️平稳'}</td><td style="font-size:10px;color:var(--text-muted)">${tips[r.name]||''}</td></tr>`;
  });
  return h+'</tbody></table></div>';
}
function renderBudgetTable(){
  let h='<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>部门</th><th style="text-align:right">预算</th><th style="text-align:right">实际</th><th style="text-align:right">差异</th><th style="text-align:right">差异率</th><th>分析</th><th>状态</th></tr></thead><tbody>';
  budgetVariance.forEach(v=>{
    const sc=v.rate>3?'danger':v.rate>0?'warning':'normal';
    const st=v.rate>3?'超预算':v.rate>0?'轻微超支':'正常';
    h+=`<tr><td>${v.dept}</td><td style="text-align:right">${v.budget}</td><td style="text-align:right">${v.actual}</td><td style="text-align:right;color:${v.variance>0?'var(--accent-red)':'var(--accent-green)'}">${v.variance>0?'+':''}${v.variance}</td><td style="text-align:right;color:${v.rate>0?'var(--accent-red)':'var(--accent-green)'}">${v.rate>0?'+':''}${v.rate}%</td><td style="font-size:10px;color:var(--text-muted)">${v.analysis}</td><td><span class="status-badge ${sc}">${st}</span></td></tr>`;
  });
  return h+'</tbody></table></div>';
}
function renderFinancingTable(){
  let h='<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>方案</th><th style="text-align:right">规模(万)</th><th>利率</th><th>期限</th><th>特点</th><th style="text-align:right">评分</th></tr></thead><tbody>';
  financingOptions.forEach(o=>{
    const sc=o.score>=90?'normal':o.score>=80?'info':'warning';
    h+=`<tr><td>${o.name}</td><td style="text-align:right">${o.amount.toLocaleString()}</td><td>${o.rate}</td><td>${o.term}</td><td style="font-size:10px;color:var(--text-muted)">${o.feature}</td><td style="text-align:right"><span class="status-badge ${sc}">${o.score}分</span></td></tr>`;
  });
  return h+'</tbody></table></div>';
}
function renderComplianceTable(){
  let h='<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>事项</th><th>截止日期</th><th>最近完成</th><th>状态</th></tr></thead><tbody>';
  taxCompliance.forEach(c=>{
    h+=`<tr><td>${c.item}</td><td>${c.deadline}</td><td>${c.lastDone}</td><td><span class="status-badge ${c.status}">${c.status==='normal'?'已完成':c.status==='warning'?'即将到期':'待处理'}</span></td></tr>`;
  });
  return h+'</tbody></table></div>';
}
function renderRiskEvents(){
  const icons={danger:'🔴',warning:'🟡',normal:'🟢'};
  return '<div>'+riskEvents.map(e=>`
    <div class="alert-item">
      <span class="alert-icon">${icons[e.type]}</span>
      <div class="alert-content"><div class="alert-title">${e.title}</div><div class="alert-desc">${e.desc}</div></div>
      <div style="text-align:right"><div class="alert-time">${e.date}</div><span class="status-badge ${e.type==='danger'?'danger':e.type==='warning'?'warning':'normal'}" style="margin-top:4px;display:inline-block">${e.status}</span></div>
    </div>`).join('')+'</div>';
}
